spring:
  application:
    name: employee-management
  datasource:
    url: jdbc:postgresql://postgres:5432/employeedb
    username: postgres
    password: postgres123
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway
  endpoint:
    health:
      show-details: always
