<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1 th:text="${employee.id != null ? '✏️ Edit Employee' : '➕ Add New Employee'}"></h1>
        </header>

        <div class="form-container">
            <form th:action="@{/save}" th:object="${employee}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name:</label>
                        <input type="text" th:field="*{firstName}" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name:</label>
                        <input type="text" th:field="*{lastName}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" th:field="*{email}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Department:</label>
                        <select th:field="*{department}" required>
                            <option value="">Select Department</option>
                            <option value="Engineering">Engineering</option>
                            <option value="HR">HR</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Finance">Finance</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Position:</label>
                        <input type="text" th:field="*{position}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Salary:</label>
                        <input type="number" step="0.01" th:field="*{salary}" required>
                    </div>
                    <div class="form-group">
                        <label>Hire Date:</label>
                        <input type="date" th:field="*{hireDate}" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Save</button>
                    <a href="/" class="btn btn-secondary">❌ Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
