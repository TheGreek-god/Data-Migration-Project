name: CI/CD Pipeline - Database Migrations

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build & Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-jar
          path: target/*.jar

  # Job 2: Validate Migrations
  validate-migrations:
    name: Validate Database Migrations
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: employeedb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Validate migration naming
        run: |
          echo "Checking migration file naming conventions..."
          for file in src/main/resources/db/migration/*.sql; do
            if [[ ! $(basename $file) =~ ^V[0-9]+__.*\.sql$ ]]; then
              echo "❌ Invalid migration name: $file"
              exit 1
            fi
          done
          echo "✅ All migration files follow naming convention"

      - name: Run Flyway validate
        run: |
          mvn flyway:validate \
            -Dflyway.url=jdbc:postgresql://localhost:5432/employeedb \
            -Dflyway.user=postgres \
            -Dflyway.password=postgres123

      - name: Run Flyway migrate (dry run)
        run: |
          mvn flyway:migrate \
            -Dflyway.url=jdbc:postgresql://localhost:5432/employeedb \
            -Dflyway.user=postgres \
            -Dflyway.password=postgres123

      - name: Check migration history
        run: |
          mvn flyway:info \
            -Dflyway.url=jdbc:postgresql://localhost:5432/employeedb \
            -Dflyway.user=postgres \
            -Dflyway.password=postgres123

  # Job 3: Build Docker Image
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, validate-migrations]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 4: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Backup database
        run: |
          echo "Creating database backup before migration..."
          kubectl exec -n employee-staging deployment/postgres -- \
            pg_dump -U postgres employeedb > backup-$(date +%Y%m%d-%H%M%S).sql

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/ -n employee-staging
          kubectl rollout status deployment/employee-app -n employee-staging --timeout=5m

      - name: Run migrations
        run: |
          kubectl wait --for=condition=ready pod -l app=employee-app -n employee-staging --timeout=5m
          echo "Migrations will run automatically on pod startup"

      - name: Verify deployment
        run: |
          kubectl get pods -n employee-staging
          kubectl logs -l app=employee-app -n employee-staging --tail=50 | grep "Flyway"

  # Job 5: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Backup production database
        run: |
          echo "Creating production database backup..."
          kubectl exec -n employee-prod deployment/postgres -- \
            pg_dump -U postgres employeedb > prod-backup-$(date +%Y%m%d-%H%M%S).sql
          
      - name: Blue-Green Deployment
        run: |
          # Deploy new version (green)
          kubectl apply -f k8s/ -n employee-prod
          kubectl rollout status deployment/employee-app -n employee-prod --timeout=10m
          
          # Health check
          kubectl wait --for=condition=ready pod -l app=employee-app -n employee-prod --timeout=5m
          
          # Switch traffic to green
          kubectl patch service employee-app -n employee-prod -p '{"spec":{"selector":{"version":"green"}}}'

      - name: Verify production deployment
        run: |
          kubectl get pods -n employee-prod
          kubectl logs -l app=employee-app -n employee-prod --tail=100 | grep "Flyway"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/employee-app -n employee-prod
          kubectl rollout status deployment/employee-app -n employee-prod

  # Job 6: Notify
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Notify success
        if: success()
        run: echo "✅ Deployment successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed!"
