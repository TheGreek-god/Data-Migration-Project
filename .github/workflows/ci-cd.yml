name: CI/CD Pipeline - Database Migrations

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: greekgod659/data-migration-project

jobs:
  build-and-test:
    name: Build & Test Application
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  validate-migrations:
    name: Validate Database Migrations
    runs-on: self-hosted
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate migration files exist
        run: |
          Write-Host "Checking migration files..."
          if (Test-Path "src/main/resources/db/migration") {
            Write-Host "✅ Migration directory exists"
            Get-ChildItem src/main/resources/db/migration/
          } else {
            Write-Host "❌ Migration directory not found"
            exit 1
          }

  build-docker:
    name: Build & Push Docker Image
    runs-on: self-hosted
    needs: [build-and-test, validate-migrations]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: build-docker
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Backup database
        run: |
          echo "Creating database backup before migration..."
          kubectl exec -n employee-staging deployment/postgres -- \
            pg_dump -U postgres employeedb > backup-$(date +%Y%m%d-%H%M%S).sql

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/ -n employee-staging
          kubectl rollout status deployment/employee-app -n employee-staging --timeout=5m

      - name: Run migrations
        run: |
          kubectl wait --for=condition=ready pod -l app=employee-app -n employee-staging --timeout=5m
          echo "Migrations will run automatically on pod startup"

      - name: Verify deployment
        run: |
          kubectl get pods -n employee-staging
          kubectl logs -l app=employee-app -n employee-staging --tail=50 | grep "Flyway"

  deploy-production:
    name: Deploy to Production
    runs-on: self-hosted
    needs: deploy-staging
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Backup production database
        run: |
          echo "Creating production database backup..."
          kubectl exec -n employee-prod deployment/postgres -- \
            pg_dump -U postgres employeedb > prod-backup-$(date +%Y%m%d-%H%M%S).sql
          
      - name: Blue-Green Deployment
        run: |
          # Deploy new version (green)
          kubectl apply -f k8s/ -n employee-prod
          kubectl rollout status deployment/employee-app -n employee-prod --timeout=10m
          
          # Health check
          kubectl wait --for=condition=ready pod -l app=employee-app -n employee-prod --timeout=5m
          
          # Switch traffic to green
          kubectl patch service employee-app -n employee-prod -p '{"spec":{"selector":{"version":"green"}}}'

      - name: Verify production deployment
        run: |
          kubectl get pods -n employee-prod
          kubectl logs -l app=employee-app -n employee-prod --tail=100 | grep "Flyway"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/employee-app -n employee-prod
          kubectl rollout status deployment/employee-app -n employee-prod

  notify:
    name: Send Notifications
    runs-on: self-hosted
    needs: [deploy-production]
    if: always()
    steps:
      - name: Notify success
        if: success()
        run: echo "✅ Deployment successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed!"
