name: CI/CD Pipeline - Database Migrations

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: greekgod659/data-migration-project

jobs:
  build-and-test:
    name: Build & Test Application
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  validate-migrations:
    name: Validate Database Migrations
    runs-on: self-hosted
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate migration files exist
        run: |
          Write-Host "Checking migration files..."
          if (Test-Path "src/main/resources/db/migration") {
            Write-Host "✅ Migration directory exists"
            Get-ChildItem src/main/resources/db/migration/
          } else {
            Write-Host "❌ Migration directory not found"
            exit 1
          }

  build-docker:
    name: Build & Push Docker Image
    runs-on: self-hosted
    needs: [build-and-test, validate-migrations]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Pipeline Status
    runs-on: self-hosted
    needs: [build-docker]
    if: always()
    steps:
      - name: Notify success
        if: success()
        run: |
          Write-Host "✅ Pipeline successful!"
          Write-Host "Docker image pushed to: ${{ env.IMAGE_NAME }}"
          Write-Host "To deploy locally: docker-compose pull && docker-compose up"

      - name: Notify failure
        if: failure()
        run: Write-Host "❌ Pipeline failed!"
